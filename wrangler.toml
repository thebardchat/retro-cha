name = "retro-cha"
main = "worker/src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
# Worker runs first for every request and either handles it (WS upgrades)
# or delegates to env.ASSETS.fetch(req) for static files.
run_worker_first = true

[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[observability]
enabled = true
