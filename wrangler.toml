name = "retro-cha"
main = "worker/src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
# Let the Worker handle WS routes first; everything else goes to static assets.
run_worker_first = ["/ws/*", "/dm/*"]

[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[observability]
enabled = true
